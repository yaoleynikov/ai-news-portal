# SiliconFeed — только worker в Docker (встроенный RSS gatekeeper ~каждые 30 мин).
#
# Нужен backend/.env (не коммитить). Секреты: Supabase, OpenRouter, Logo.dev, HF, R2,
# опционально Telegram / Google Indexing — см. .env.example.
#
# Запуск:
#   cd backend
#   cp .env.example .env && отредактировать .env
#   docker compose up -d --build
#
# Не ставить GATEKEEPER_INTERVAL_MS=0 — иначе RSS не подтянется без отдельного процесса вне Docker.
# База — облачный Supabase; Postgres здесь не поднимается.

services:
  worker:
    build: .
    container_name: siliconfeed-worker
    restart: unless-stopped
    env_file:
      - .env
    command: ["npm", "run", "worker"]
    mem_limit: 768m
    volumes:
      - hf_cache:/app/.cache

volumes:
  hf_cache:
